repos:
  - repo: https://github.com/astral-sh/uv-pre-commit
    # uv version.
    rev: 0.9.26
    hooks:
      - id: uv-lock
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Ruff version.
    rev: v0.14.13
    hooks:
      # Run the linter.
      - id: ruff-check
        types_or: [ python, pyi ]
        args: [ --fix ]
      # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/PyCQA/bandit
    rev: '1.9.3' # Update me!
    hooks:
    - id: bandit
      args: ["-c", "pyproject.toml"]

  - repo: https://github.com/econchick/interrogate
    rev: 1.7.0  # Update me!
    hooks:
      - id: interrogate
        name: interrogate
        entry: interrogate -c pyproject.toml -v src/sw_metadata_bot/
        pass_filenames: false
        always_run: true