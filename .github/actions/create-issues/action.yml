name: 'SW Metadata Bot - Create Issues'
description: 'Create GitHub/GitLab issues based on metadata analysis results'
author: 'Tom François'

inputs:
  pitfalls-output-dir:
    description: 'Directory containing pitfalls JSON-LD files from metacheck analysis'
    required: true
  community-config-file:
    description: 'Unified community JSON configuration file'
    required: true
  analysis-summary-file:
    description: 'Optional analysis summary JSON path for commit-aware incremental handling'
    required: false
    default: ''
  previous-report:
    description: 'Optional previous report.json path for incremental issue handling'
    required: false
    default: ''
  dependency-group:
    description: 'Dependency group used during installation'
    required: false
    default: 'dev'
  issues-dir:
    description: 'Directory to save issue bodies and reports'
    required: false
    default: 'issues_output'
  dry-run:
    description: 'Simulate issue creation without actually posting to repositories'
    required: false
    default: 'true'
  log-level:
    description: 'Logging level (DEBUG, INFO, WARNING, ERROR)'
    required: false
    default: 'INFO'

outputs:
  issues-dir:
    description: 'Directory containing the generated issue files'
    value: ${{ inputs.issues-dir }}

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version-file: '.python-version'

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Install dependencies
      shell: bash
      run: uv sync --group "${{ inputs.dependency-group }}"

    - name: Create output directory
      shell: bash
      run: mkdir -p "${{ inputs.issues-dir }}"

    - name: Create issues
      shell: bash
      run: |
        set -euo pipefail

        args=(
          create-issues
          --pitfalls-output-dir "${{ inputs.pitfalls-output-dir }}"
          --issues-dir "${{ inputs.issues-dir }}"
          --community-config-file "${{ inputs.community-config-file }}"
          --log-level "${{ inputs.log-level }}"
        )

        if [[ "${{ inputs.analysis-summary-file }}" != "" ]]; then
          args+=(--analysis-summary-file "${{ inputs.analysis-summary-file }}")
        fi

        if [[ "${{ inputs.previous-report }}" != "" ]]; then
          args+=(--previous-report "${{ inputs.previous-report }}")
        fi

        if [[ "${{ inputs.dry-run }}" == "true" ]]; then
          args+=(--dry-run)
        fi

        uv run sw-metadata-bot "${args[@]}"
