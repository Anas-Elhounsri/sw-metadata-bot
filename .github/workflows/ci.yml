name: CI (uv)

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["*"]
  release:
    types: [published]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: dev

      - name: Ruff format (check)
        run: uv run ruff format --check

      - name: Ruff check
        run: uv run ruff check --output-format=github

  security:
    name: Security (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: dev

      - name: Run Bandit security linter
        run: uv run bandit -c pyproject.toml -r src/sw_metadata_bot/

  interrogate:
      name: Interrogate badge
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: dev

      - name: Interrogate (docstring coverage)
        run: uv run interrogate -c pyproject.toml
      
      - name: Commit interrogate badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add interrogate_badge.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update interrogate badge"
          git push
        continue-on-error: true
        

  test:
    name: Test (pytest unit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: test

      - name: Runtime smoke checks
        run: |
          uv run python -c "import sw_metadata_bot; import metacheck; print('Runtime imports OK')"
          uv run sw-metadata-bot run-analysis --help
          uv run sw-metadata-bot publish --help

      - name: Run pytest unit tests with coverage
        run: |
          uv run pytest -m "not integration_gitlab" \
            --cov=src/sw_metadata_bot \
            --cov-report=term-missing \
            tests/

      - name: Run small analysis without publishing
        run: uv run sw-metadata-bot run-analysis --config-file assets/example_list_repo.json

      - name: Generate coverage badge
        run: uv run coverage-badge -o coverage.svg -f
        continue-on-error: true

      - name: Commit coverage badge
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add coverage.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update coverage badge"
          git push
        continue-on-error: true

  test-gitlab-integration:
    name: Test (GitLab integration)
    if: ${{ (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    env:
      GITLAB_API_TOKEN: ${{ secrets.GITLAB_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: test

      - name: Skip integration tests when token is not configured
        if: ${{ env.GITLAB_API_TOKEN == '' }}
        run: |
          echo "GITLAB_API_TOKEN is not configured; skipping GitLab integration tests."
          exit 0

      - name: Verify GitLab token before integration tests
        if: ${{ env.GITLAB_API_TOKEN != '' }}
        run: uv run sw-metadata-bot verify-tokens --gitlab

      - name: Run GitLab integration tests
        if: ${{ env.GITLAB_API_TOKEN != '' }}
        run: uv run pytest --run-integration-gitlab -m "integration_gitlab" tests/test_gitlab_integration.py
      
      

      

  docs:
    name: Docs (Sphinx)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: docs

      - name: Build Sphinx HTML
        run: uv run sphinx-build -b html docs docs/_build/html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/_build/html

  publish-docs:
    name: Publish Docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  publish-pypi:
    name: Publish to PyPI
    if: github.event_name == 'release'
    needs: [lint, test]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup uv environment
        uses: ./.github/actions/setup-uv
        with:
          dependency-group: dev

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

