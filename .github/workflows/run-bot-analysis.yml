name: Run Bot Analysis and Issues Generation on ESCAPE-OSSR

on:
  schedule:
    # Run every first day of the month at 00:00 UTC
    - cron: '0 0 1 * *'
  workflow_dispatch:
  pull_request:
    paths:
      - '.github/actions/**'
      - '.github/workflows/run-bot-analysis.yml'
      - 'src/sw_metadata_bot/**'
      - 'pyproject.toml'

jobs:
  analyze-and-create-issues:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      COMMUNITY_CONFIG_FILE: assets/ossr_list_url.json

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Resolve run metadata
        id: run_meta
        shell: bash
        run: |
          set -euo pipefail
          SNAPSHOT_TAG="$(date -u +%Y%m%d)"

          OUTPUT_ROOT="$(python -c 'import json, os; p=os.environ["COMMUNITY_CONFIG_FILE"]; d=json.load(open(p, encoding="utf-8")); print(d.get("outputs", {}).get("root_dir", "outputs"))')"
          RUN_NAME="$(python -c 'import json, os, pathlib; p=os.environ["COMMUNITY_CONFIG_FILE"]; d=json.load(open(p, encoding="utf-8")); print(d.get("outputs", {}).get("run_name", d.get("community", {}).get("name", pathlib.Path(p).stem)))')"

          RUN_ROOT="${OUTPUT_ROOT}/${RUN_NAME}/${SNAPSHOT_TAG}"

          echo "snapshot_tag=${SNAPSHOT_TAG}" >> "$GITHUB_OUTPUT"
          echo "run_root=${RUN_ROOT}" >> "$GITHUB_OUTPUT"
          echo "analysis_output=${RUN_ROOT}/analysis_results.json" >> "$GITHUB_OUTPUT"
          echo "pitfalls_output=${RUN_ROOT}/pitfalls_outputs" >> "$GITHUB_OUTPUT"
          echo "issues_output=${RUN_ROOT}/issues_out" >> "$GITHUB_OUTPUT"

      - name: Run full pipeline in dry-run mode
        uses: ./.github/actions/run-pipeline
        with:
          community-config-file: ${{ env.COMMUNITY_CONFIG_FILE }}
          snapshot-tag: ${{ steps.run_meta.outputs.snapshot_tag }}
          dry-run: 'true'

      - name: Upload analysis results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: analysis-results
          path: ${{ steps.run_meta.outputs.analysis_output }}
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload pitfalls files
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: pitfalls-files
          path: ${{ steps.run_meta.outputs.pitfalls_output }}/
          if-no-files-found: ignore
          retention-days: 30

      - name: Upload generated issues
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: generated-issues
          path: ${{ steps.run_meta.outputs.issues_output }}/
          retention-days: 30

      - name: Generate summary
        if: always()
        run: |
          echo "## Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "${{ steps.run_meta.outputs.analysis_output }}" ]; then
            echo "### Analysis Results" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`json" >> $GITHUB_STEP_SUMMARY
            head -100 "${{ steps.run_meta.outputs.analysis_output }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Output Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- Analysis results: \`${{ steps.run_meta.outputs.analysis_output }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Pitfalls files: \`${{ steps.run_meta.outputs.pitfalls_output }}/\`" >> $GITHUB_STEP_SUMMARY
          echo "- Generated issues: \`${{ steps.run_meta.outputs.issues_output }}/\`" >> $GITHUB_STEP_SUMMARY
