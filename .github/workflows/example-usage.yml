name: Example - Run SW Metadata Bot on This Repo

on:
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  analyze-and-create-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build temporary community config
        id: community
        shell: bash
        run: |
          set -euo pipefail
          SNAPSHOT_TAG="$(date -u +%Y%m%d)"
          COMMUNITY_CONFIG_FILE="assets/workflow_example_community.json"

          mkdir -p assets
          cat > "${COMMUNITY_CONFIG_FILE}" << EOF
          {
            "community": {
              "name": "${{ github.event.repository.name }}"
            },
            "repositories": [
              "https://github.com/${{ github.repository }}"
            ],
            "issues": {
              "custom_message": "This repository was analyzed via the sw-metadata-bot example workflow.",
              "opt_outs": []
            },
            "outputs": {
              "root_dir": "outputs",
              "run_name": "example",
              "snapshot_tag_format": null
            }
          }
          EOF

          echo "community_config=${COMMUNITY_CONFIG_FILE}" >> "$GITHUB_OUTPUT"
          echo "snapshot_tag=${SNAPSHOT_TAG}" >> "$GITHUB_OUTPUT"
          echo "run_root=outputs/example/${SNAPSHOT_TAG}" >> "$GITHUB_OUTPUT"

      - name: Run full pipeline (dry-run)
        uses: ./.github/actions/run-pipeline
        with:
          community-config-file: ${{ steps.community.outputs.community_config }}
          snapshot-tag: ${{ steps.community.outputs.snapshot_tag }}
          dry-run: 'true'

      - name: Upload analysis artifacts
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: sw-metadata-bot-results
          path: |
            ${{ steps.community.outputs.run_root }}/analysis_results.json
            ${{ steps.community.outputs.run_root }}/pitfalls_outputs/
            ${{ steps.community.outputs.run_root }}/issues_out/
          if-no-files-found: ignore
